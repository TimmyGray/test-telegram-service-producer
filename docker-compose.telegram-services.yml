services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    hostname: producer
    build:
      context: ./test-telegram-service-producer
      dockerfile: Dockerfile
      args:
        RABBITMQ_URI_OVERRIDE: ${RABBITMQ_URI:-amqp://admin:admin@rabbitmq:5672}
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  consumer:
    hostname: consumer
    build:
      context: ./test-telegram-service-consumer
      dockerfile: Dockerfile
      args:
        RABBITMQ_URI_OVERRIDE: ${RABBITMQ_URI:-amqp://admin:admin@rabbitmq:5672}
        TELEGRAM_TOKEN_OVERRIDE: ${TELEGRAM_TOKEN:-}
        TELEGRAM_CHAT_ID_OVERRIDE: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  rabbitmq_data:
